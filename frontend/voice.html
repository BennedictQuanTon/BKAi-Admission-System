<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="BKAi Voice — Trợ lý tuyển sinh bằng giọng nói, Trường Đại học Bách khoa - ĐHQG-HCM" />
  <title>BKAi Voice — Tư vấn bằng Giọng nói</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    /* ═══════════════════════════════════════════
       BKAi Voice — Premium Dark Voice Interface
       ═══════════════════════════════════════════ */

    .voice-page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: relative;
      z-index: 10;
    }

    /* ── Top Navigation ── */
    .voice-nav {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(10, 10, 15, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
    }

    .back-link:hover {
      color: var(--text-primary);
      background: var(--bg-tertiary);
    }

    .voice-nav-title {
      font-size: 16px;
      font-weight: 600;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .voice-nav-badge {
      margin-left: auto;
      font-size: 11px;
      padding: 3px 10px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      color: var(--accent-light);
      font-weight: 500;
    }

    /* ── Main Content ── */
    .voice-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Mic Area (center) ── */
    .mic-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      min-height: 280px;
      padding: 32px 24px 24px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* When conversation exists, shrink mic to top */
    .mic-area.compact {
      flex: 0;
      min-height: auto;
      padding: 20px 24px 12px;
    }

    .mic-area.compact .mic-ring {
      width: 100px;
      height: 100px;
      margin-bottom: 12px;
    }

    .mic-area.compact .mic-btn {
      width: 80px;
      height: 80px;
    }

    .mic-area.compact .mic-icon {
      width: 28px;
      height: 28px;
    }

    .mic-area.compact .waveform-container {
      width: 180px;
      height: 32px;
    }

    .mic-area.compact .status-label {
      font-size: 14px;
    }

    /* Mic button outer ring (pulse effect) */
    .mic-ring {
      position: relative;
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .mic-ring::before,
    .mic-ring::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .mic-ring::before {
      width: 160px;
      height: 160px;
      border: 2px solid var(--accent);
    }

    .mic-ring::after {
      width: 180px;
      height: 180px;
      border: 1px solid var(--accent);
    }

    .mic-ring.active::before {
      opacity: 0.4;
      animation: ring-pulse 2s ease-in-out infinite;
    }

    .mic-ring.active::after {
      opacity: 0.2;
      animation: ring-pulse 2s ease-in-out infinite 0.3s;
    }

    @keyframes ring-pulse {
      0% { transform: scale(0.95); opacity: 0.4; }
      50% { transform: scale(1.1); opacity: 0; }
      100% { transform: scale(0.95); opacity: 0; }
    }

    /* Mic button */
    .mic-btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: var(--accent-gradient);
      border: none;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.35);
      position: relative;
      z-index: 2;
    }

    .mic-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 40px rgba(99, 102, 241, 0.5);
    }

    .mic-btn:active {
      transform: scale(0.98);
    }

    .mic-btn.recording {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      box-shadow: 0 8px 32px rgba(239, 68, 68, 0.4);
      animation: mic-pulse 1.5s ease-in-out infinite;
    }

    .mic-btn.processing {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      box-shadow: 0 8px 32px rgba(245, 158, 11, 0.4);
      cursor: wait;
    }

    .mic-btn.speaking {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      box-shadow: 0 8px 32px rgba(34, 197, 94, 0.4);
    }

    .mic-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    @keyframes mic-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    .mic-icon {
      width: 40px;
      height: 40px;
      transition: transform 0.2s;
    }

    .mic-btn.recording .mic-icon {
      animation: mic-shake 0.5s ease-in-out infinite;
    }

    @keyframes mic-shake {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-3deg); }
      75% { transform: rotate(3deg); }
    }

    /* ── Waveform Visualizer ── */
    .waveform-container {
      width: 240px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      margin-bottom: 16px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .waveform-container.active {
      opacity: 1;
    }

    .waveform-bar {
      width: 4px;
      height: 8px;
      border-radius: 2px;
      background: var(--accent-light);
      transition: height 0.1s ease;
    }

    .waveform-container.active .waveform-bar {
      animation: wave 0.8s ease-in-out infinite;
    }

    @keyframes wave {
      0%, 100% { height: 8px; opacity: 0.4; }
      50% { height: 32px; opacity: 1; }
    }

    /* ── Status Area ── */
    .status-area {
      text-align: center;
      margin-bottom: 8px;
    }

    .status-label {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
      min-height: 28px;
      transition: color 0.3s;
    }

    .status-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── Conversation History ── */
    .conversation-area {
      flex: 1;
      overflow-y: auto;
      padding: 0 24px 24px;
      scroll-behavior: smooth;
    }

    .conversation-area::-webkit-scrollbar {
      width: 6px;
    }

    .conversation-area::-webkit-scrollbar-thumb {
      background: var(--bg-tertiary);
      border-radius: 3px;
    }

    .voice-message {
      margin-bottom: 16px;
      animation: slideUp 0.35s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .voice-msg-user {
      display: flex;
      justify-content: flex-end;
    }

    .voice-msg-user .voice-msg-bubble {
      background: var(--accent);
      color: white;
      border-radius: var(--radius-lg);
      border-bottom-right-radius: 4px;
      padding: 12px 16px;
      max-width: 85%;
      font-size: 14px;
      line-height: 1.6;
    }

    .voice-msg-ai {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .voice-msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      background: var(--accent-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .voice-msg-body {
      flex: 1;
      min-width: 0;
    }

    .voice-msg-ai .voice-msg-bubble {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      border-top-left-radius: 4px;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-primary);
      backdrop-filter: blur(10px);
    }

    .voice-msg-ai .voice-msg-bubble strong {
      font-weight: 600;
      color: var(--accent-light);
    }

    /* Audio player inline */
    .voice-audio-player {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      padding: 6px 10px;
      background: rgba(99, 102, 241, 0.08);
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: var(--radius-sm);
    }

    .audio-play-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .audio-play-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .audio-label {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ── Voice Meta ── */
    .voice-msg-meta {
      display: flex;
      gap: 10px;
      margin-top: 6px;
      padding-left: 2px;
    }

    .voice-meta-chip {
      font-size: 10px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── Empty State ── */
    .voice-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
      opacity: 0.6;
    }

    .voice-empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .voice-empty-text {
      font-size: 14px;
      color: var(--text-secondary);
      max-width: 300px;
      line-height: 1.6;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .mic-area {
        padding: 20px 16px 16px;
      }

      .mic-btn {
        width: 100px;
        height: 100px;
      }

      .mic-ring {
        width: 120px;
        height: 120px;
      }

      .mic-icon {
        width: 32px;
        height: 32px;
      }

      .conversation-area {
        padding: 0 16px 16px;
      }

      .voice-nav {
        padding: 12px 16px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Animated background -->
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="voice-page">
      <!-- Navigation -->
      <nav class="voice-nav">
        <a href="/" class="back-link" id="backLink">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          Chat
        </a>
        <span class="voice-nav-title">🎙️ BKAi Voice</span>
        <span class="voice-nav-badge" id="sessionBadge">Phiên mới</span>
      </nav>

      <!-- Voice Content -->
      <div class="voice-content">
        <!-- Mic Area -->
        <div class="mic-area">
          <!-- Waveform Visualizer -->
          <div class="waveform-container" id="waveform">
            <!-- 24 bars generated by JS -->
          </div>

          <!-- Mic Button with Ring -->
          <div class="mic-ring" id="micRing">
            <button class="mic-btn" id="micBtn" title="Nhấn để nói">
              <svg class="mic-icon" id="micIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="23"></line>
                <line x1="8" y1="23" x2="16" y2="23"></line>
              </svg>
            </button>
          </div>

          <!-- Status -->
          <div class="status-area">
            <div class="status-label" id="statusLabel">Nhấn để bắt đầu nói</div>
            <div class="status-hint" id="statusHint">Tự động dừng khi phát hiện khoảng lặng</div>
          </div>
        </div>

        <!-- Conversation History -->
        <div class="conversation-area" id="conversationArea">
          <div class="voice-empty" id="emptyState">
            <div class="voice-empty-icon">🎓</div>
            <div class="voice-empty-text">
              Hãy nhấn nút micro phía trên và hỏi về tuyển sinh Bách khoa bằng giọng nói tiếng Việt
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/voice.js"></script>
</body>
</html>
