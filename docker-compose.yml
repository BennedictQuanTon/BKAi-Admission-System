# =============================================
# BKAi — Docker Compose
# Hệ thống Tư vấn Tuyển sinh Bách Khoa
# =============================================
# Khởi chạy: docker compose up --build -d
# Tắt:       docker compose down
# =============================================

services:
  # ── Redis Stack: Semantic Cache & Stats ──
  redis:
    image: redis/redis-stack-server:latest
    container_name: bkai-redis
    ports:
      - "6380:6379"   # Host 6380 to avoid conflict with local Redis on 6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Backend: FastAPI + Agentic RAG ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bkai-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override local Redis URL to point to the docker container
      - REDIS_URL=redis://redis:6379/0
      # Override CORS to allow frontend and dashboard
      - API_CORS_ORIGINS=http://localhost:5173,http://localhost:5174,http://localhost:5175
    volumes:
      - chroma_data:/app/memory/vector_db
      - ./backend/data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend: Chat UI (Nginx) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bkai-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Dashboard: Monitoring UI (Nginx) ──
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: bkai-dashboard
    ports:
      - "5174:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  chroma_data:
    driver: local
